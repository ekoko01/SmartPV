services:
  - type: web
    name: pv-smart-web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://pv-smart-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: pv-smart-db
          property: connectionString

databases:
  - name: pv-smart-db
